<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Flor Indispensable · Poema Eterno</title>
    <!-- Google Fonts + Font Awesome 6 (con fallback seguro) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f1f 100%);
            background-attachment: fixed;
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Fondo con estrellas sutiles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, rgba(255,255,200,0.3), transparent),
                radial-gradient(3px 3px at 60% 70%, rgba(255,200,150,0.2), transparent),
                radial-gradient(1px 1px at 85% 20%, rgba(255,220,180,0.4), transparent),
                radial-gradient(2px 2px at 40% 85%, rgba(255,210,160,0.25), transparent),
                radial-gradient(1px 1px at 10% 50%, rgba(255,230,190,0.35), transparent);
            background-size: 200px 200px;
            background-repeat: repeat;
            pointer-events: none;
            z-index: 0;
        }

        /* Partículas flotantes mejoradas */
        .particle {
            position: fixed;
            pointer-events: none;
            background: radial-gradient(circle, rgba(255, 210, 150, 0.5), rgba(255, 160, 100, 0));
            border-radius: 50%;
            z-index: 0;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-20vh) translateX(calc(50px - 100px * var(--dir, 0.5))) rotate(360deg);
                opacity: 0;
            }
        }

        /* Contenedor principal con gradiente más luminoso */
        .poem-card {
            position: relative;
            z-index: 10;
            max-width: 820px;
            width: 100%;
            background: linear-gradient(135deg, rgba(25, 20, 45, 0.75), rgba(15, 10, 35, 0.85));
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            padding: 2.5rem 2rem 2.2rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 200, 150, 0.2) inset;
            transition: all 0.3s ease;
            border: 1px solid rgba(230, 190, 140, 0.3);
            animation: cardBreathing 4s ease-in-out infinite;
        }

        @keyframes cardBreathing {
            0%, 100% {
                box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 200, 150, 0.2) inset;
            }
            50% {
                box-shadow: 0 35px 60px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 190, 120, 0.35) inset;
            }
        }

        /* Ícono floral animado */
        .floral-icon {
            text-align: center;
            margin-bottom: 1.2rem;
            font-size: 2rem;
            transition: all 0.4s ease;
        }

        .floral-icon i {
            transition: all 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
            filter: drop-shadow(0 0 6px rgba(255, 200, 120, 0.6));
            display: inline-block;
        }

        /* Zona del poema */
        .verse-stage {
            min-height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 1.8rem;
        }

        .verse-text {
            font-size: clamp(1.6rem, 6vw, 2.8rem);
            font-weight: 500;
            line-height: 1.45;
            text-align: center;
            color: #fff5e8;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            letter-spacing: -0.01em;
            transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.4s ease, filter 0.4s ease;
            word-break: break-word;
            font-family: 'Cormorant Garamond', serif;
            white-space: pre-line;
        }

        /* Estilo para versos de anticipación */
        .verse-text.anticipation {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
            letter-spacing: 0.02em;
            font-size: clamp(1.5rem, 5.5vw, 2.5rem);
            color: #ffe6c7;
        }

        /* Estilo para el poema completo */
        .verse-text.full-poem {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.15rem, 3.8vw, 1.65rem);
            line-height: 1.75;
            text-align: left;
            max-width: 90%;
            margin: 0 auto;
            font-weight: 400;
            color: #f7efdf;
        }

        /* Efecto cascada para el poema final */
        .verse-text.full-poem.cascade span {
            display: block;
            animation: lineReveal 0.6s ease forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        @keyframes lineReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .verse-text.animate-in {
            opacity: 1;
            transform: translateY(0);
        }

        .verse-text.animate-out {
            opacity: 0;
            transform: translateY(12px);
            filter: blur(3px);
        }

        /* Barra de progreso elegante */
        .progress-area {
            margin: 1.5rem 0 2rem 0;
        }

        .progress-track {
            background: rgba(255, 220, 180, 0.15);
            border-radius: 50px;
            height: 4px;
            width: 100%;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #e8c9a0, #f5deb3, #e8b88c);
            background-size: 200% auto;
            border-radius: 50px;
            transition: width 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 0 10px #ffd49f;
            animation: progressShine 2s linear infinite;
        }

        @keyframes progressShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .verse-counter {
            text-align: center;
            margin-top: 0.7rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 300;
            color: #b9aa8a;
            text-transform: uppercase;
        }

        /* Botones elegantes con efecto */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.9rem;
            margin-top: 0.5rem;
        }

        .ctrl-btn {
            background: rgba(30, 25, 55, 0.7);
            border: 1px solid rgba(235, 195, 140, 0.4);
            backdrop-filter: blur(4px);
            padding: 0.7rem 1.3rem;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            color: #f5e6d3;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .ctrl-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 210, 150, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .ctrl-btn:active::before {
            width: 100px;
            height: 100px;
        }

        .ctrl-btn:hover:not(:disabled) {
            background: rgba(80, 65, 110, 0.8);
            border-color: #f3cd92;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .ctrl-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .auto-active {
            background: rgba(180, 130, 80, 0.5);
            border-color: #ffdd99;
            box-shadow: 0 0 12px rgba(255, 200, 100, 0.5);
        }

        /* Footer */
        .signature {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            font-family: 'Inter', sans-serif;
            color: #8e7a5c;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        @media (max-width: 560px) {
            .poem-card {
                padding: 1.8rem 1.2rem;
            }
            .verse-stage {
                min-height: 380px;
            }
            .ctrl-btn {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
            .verse-text.full-poem {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div id="particlesContainer"></div>

<main class="poem-card">
    <div class="floral-icon" id="flowerIcon">
        <i class="fas fa-seedling"></i>
    </div>

    <div class="verse-stage">
        <div id="verseDisplay" class="verse-text animate-in"></div>
    </div>

    <div class="progress-area">
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="verse-counter" id="verseCounter">1 / 6</div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="prevBtn"><i class="fas fa-chevron-left"></i> <span>Anterior</span></button>
        <button class="ctrl-btn" id="resetBtn"><i class="fas fa-leaf"></i> <span>Renacer</span></button>
        <button class="ctrl-btn" id="nextBtn"><span>Siguiente</span> <i class="fas fa-chevron-right"></i></button>
        <button class="ctrl-btn" id="autoBtn"><i class="fas fa-play"></i> <span>Auto</span></button>
    </div>
    <div class="signature">
        ✦ un viaje hacia la flor eterna ✦
    </div>
</main>

<script>
    // ==================== POEMA SECUENCIAL ====================
    const verses = [
        "Una flor está por nacer...",
        "En el silencio, un pétalo se abre.",
        "Su aroma empieza a tejer memorias.",
        "La esperanza florece en lo profundo.",
        "Pronto, el poema se revelará...",
        `Flor única e imprescindible,\n\nen una vida ajena y gastada,\nconsumida por relatos sin fin,\nocurrencias incalculables, callada.\n\nTanto así que la vida calmó,\naguas opacas y llenas de pena,\npor consecuencia de ti, que llegó,\nflor transparente, manantial serena.\n\nEres paz en mi caos profundo,\nluz que aclara lo oscuro y confuso,\nindispensable en este mundo,\nmi flor eterna, mi todo puro.`
    ];

    const TOTAL_VERSES = verses.length;
    let currentIndex = 0;
    let isAnimating = false;
    let autoInterval = null;
    let isAutoActive = false;

    const verseDisplay = document.getElementById('verseDisplay');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const autoBtn = document.getElementById('autoBtn');
    const progressFill = document.getElementById('progressFill');
    const verseCounterSpan = document.getElementById('verseCounter');
    const flowerIcon = document.getElementById('flowerIcon');

    // ==================== PARTÍCULAS ====================
    function createParticles() {
        const container = document.getElementById('particlesContainer');
        if (!container) return;
        const particleCount = 45;
        
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 6 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.animationDelay = `${Math.random() * 15}s`;
            particle.style.animationDuration = `${Math.random() * 18 + 12}s`;
            particle.style.opacity = Math.random() * 0.5 + 0.1;
            particle.style.setProperty('--dir', Math.random());
            container.appendChild(particle);
        }
    }

    // ==================== FLOR QUE CRECE ====================
    function updateFlower() {
        const progress = (currentIndex + 1) / TOTAL_VERSES;
        const icon = flowerIcon.querySelector('i');
        const scale = 0.8 + (progress * 0.7);
        
        if (currentIndex === TOTAL_VERSES - 1) {
            icon.className = 'fas fa-rose';
            icon.style.transform = `scale(${scale})`;
            icon.style.color = '#ffb88c';
            icon.style.textShadow = '0 0 12px #ffaa77';
        } else if (currentIndex >= 3) {
            icon.className = 'fas fa-fan';
            icon.style.transform = `scale(${scale}) rotate(${progress * 180}deg)`;
            icon.style.color = '#f3cf9a';
        } else if (currentIndex >= 1) {
            icon.className = 'fas fa-leaf';
            icon.style.transform = `scale(${scale}) rotate(${progress * 90}deg)`;
            icon.style.color = '#e2c28b';
        } else {
            icon.className = 'fas fa-seedling';
            icon.style.transform = `scale(${scale})`;
        }
    }

    // ==================== PROGRESO ====================
    function updateProgressAndCounter() {
        const percent = ((currentIndex + 1) / TOTAL_VERSES) * 100;
        progressFill.style.width = `${percent}%`;
        verseCounterSpan.innerText = `${currentIndex + 1} / ${TOTAL_VERSES}`;
        updateFlower();
    }

    // ==================== ESTILO DEL VERSO ====================
    function applyVerseStyle() {
        verseDisplay.classList.remove('anticipation', 'full-poem', 'cascade');
        
        if (currentIndex === TOTAL_VERSES - 1) {
            verseDisplay.classList.add('full-poem');
            // Efecto cascada para el poema final
            const text = verses[currentIndex];
            const lines = text.split('\n');
            const wrappedLines = lines.map((line, idx) => 
                `<span style="animation-delay: ${idx * 0.04}s;">${line || '&nbsp;'}</span>`
            ).join('');
            verseDisplay.innerHTML = wrappedLines;
            verseDisplay.classList.add('cascade');
        } else if (currentIndex <= 4) {
            verseDisplay.classList.add('anticipation');
        }
    }

    // ==================== BOTONES ====================
    function updateButtonsState() {
        prevBtn.disabled = (currentIndex === 0);
        if (currentIndex === TOTAL_VERSES - 1) {
            nextBtn.disabled = true;
            if (isAutoActive) stopAutoPlay();
        } else {
            nextBtn.disabled = false;
        }
    }

    function stopAutoPlay() {
        if (autoInterval) {
            clearInterval(autoInterval);
            autoInterval = null;
        }
        isAutoActive = false;
        autoBtn.classList.remove('auto-active');
        autoBtn.innerHTML = '<i class="fas fa-play"></i> <span>Auto</span>';
    }

    function startAutoPlay() {
        if (autoInterval) stopAutoPlay();
        if (currentIndex === TOTAL_VERSES - 1) return;
        isAutoActive = true;
        autoBtn.classList.add('auto-active');
        autoBtn.innerHTML = '<i class="fas fa-pause"></i> <span>Auto</span>';
        autoInterval = setInterval(() => {
            if (isAnimating) return;
            if (currentIndex < TOTAL_VERSES - 1) {
                goToNextVerse();
            } else {
                stopAutoPlay();
            }
        }, 5000);
    }

    function toggleAutoPlay() {
        if (isAutoActive) {
            stopAutoPlay();
        } else {
            if (currentIndex !== TOTAL_VERSES - 1) startAutoPlay();
        }
    }

    // ==================== ANIMACIÓN PRINCIPAL ====================
    function changeVerseWithAnimation(newIndex) {
        if (isAnimating) return;
        if (newIndex === currentIndex) return;
        if (newIndex < 0 || newIndex >= TOTAL_VERSES) return;

        isAnimating = true;
        
        verseDisplay.classList.remove('animate-in');
        verseDisplay.classList.add('animate-out');
        
        setTimeout(() => {
            currentIndex = newIndex;
            
            if (currentIndex === TOTAL_VERSES - 1) {
                // Para el poema final, usamos el texto con formato
                verseDisplay.innerHTML = verses[currentIndex];
            } else {
                verseDisplay.innerText = verses[currentIndex];
            }
            
            updateProgressAndCounter();
            updateButtonsState();
            applyVerseStyle();
            
            verseDisplay.classList.remove('animate-out');
            verseDisplay.classList.add('animate-in');
            
            setTimeout(() => {
                isAnimating = false;
                if (isAutoActive && currentIndex === TOTAL_VERSES - 1) {
                    stopAutoPlay();
                }
            }, 120);
        }, 250);
    }

    function goToNextVerse() {
        if (isAnimating) return;
        if (currentIndex + 1 < TOTAL_VERSES) {
            changeVerseWithAnimation(currentIndex + 1);
        }
    }

    function goToPrevVerse() {
        if (isAnimating) return;
        if (currentIndex - 1 >= 0) {
            changeVerseWithAnimation(currentIndex - 1);
        }
    }

    function resetPoem() {
        if (isAnimating) return;
        if (currentIndex === 0) return;
        if (isAutoActive) stopAutoPlay();
        changeVerseWithAnimation(0);
    }

    // ==================== TECLADO ====================
    function handleKeydown(e) {
        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            if (!isAnimating && currentIndex > 0) goToPrevVerse();
            if (isAutoActive) stopAutoPlay();
        } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            if (!isAnimating && currentIndex < TOTAL_VERSES - 1) goToNextVerse();
            if (isAutoActive) stopAutoPlay();
        } else if (e.key === 'Home') {
            e.preventDefault();
            resetPoem();
            if (isAutoActive) stopAutoPlay();
        }
    }

    // ==================== INICIALIZAR ====================
    function init() {
        createParticles();
        
        verseDisplay.innerText = verses[0];
        currentIndex = 0;
        updateProgressAndCounter();
        updateButtonsState();
        applyVerseStyle();
        verseDisplay.classList.add('animate-in');
        
        // Animación inicial de la flor
        const icon = flowerIcon.querySelector('i');
        icon.style.animation = 'bloomInit 0.6s ease forwards';
        setTimeout(() => {
            icon.style.animation = '';
        }, 600);
        
        prevBtn.addEventListener('click', () => {
            if (isAutoActive) stopAutoPlay();
            goToPrevVerse();
        });
        nextBtn.addEventListener('click', () => {
            if (isAutoActive) stopAutoPlay();
            goToNextVerse();
        });
        resetBtn.addEventListener('click', () => {
            if (isAutoActive) stopAutoPlay();
            resetPoem();
        });
        autoBtn.addEventListener('click', toggleAutoPlay);
        window.addEventListener('keydown', handleKeydown);
    }
    
    // Estilo adicional para la animación de bloom inicial
    const style = document.createElement('style');
    style.textContent = `
        @keyframes bloomInit {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            60% { transform: scale(1.3) rotate(5deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
    `;
    document.head.appendChild(style);
    
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
