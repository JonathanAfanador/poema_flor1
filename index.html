<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Flor Indispensable · Poema Eterno</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #0b0a1a, #03020c);
            background-attachment: fixed;
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* === PARTÍCULAS FLOTANTES MEJORADAS === */
        .particle {
            position: fixed;
            pointer-events: none;
            background: radial-gradient(circle, rgba(255, 220, 180, 0.6), rgba(255, 180, 140, 0));
            border-radius: 50%;
            filter: blur(2px);
            z-index: 0;
            animation: floatParticle 15s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* === CONTENEDOR CON GLOW PULSANTE === */
        .poem-card {
            position: relative;
            z-index: 10;
            max-width: 820px;
            width: 100%;
            background: rgba(15, 12, 30, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 2.5rem 2rem 2.2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 220, 180, 0.15) inset;
            transition: all 0.3s ease;
            border: 1px solid rgba(230, 200, 170, 0.25);
            animation: cardGlow 4s ease-in-out infinite;
        }

        @keyframes cardGlow {
            0%, 100% {
                box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 220, 180, 0.15) inset;
            }
            50% {
                box-shadow: 0 25px 55px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 200, 150, 0.25) inset;
            }
        }

        /* === ÍCONO FLORAL QUE CRECE === */
        .floral-icon {
            text-align: center;
            margin-bottom: 1rem;
            font-size: 1.8rem;
            transition: all 0.4s ease;
            filter: drop-shadow(0 0 4px rgba(255, 200, 150, 0.5));
        }

        .floral-icon i {
            transition: transform 0.3s ease;
            color: #eacd92;
        }

        /* === ZONA DEL POEMA === */
        .verse-stage {
            min-height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .verse-text {
            font-size: clamp(1.8rem, 5.5vw, 3rem);
            font-weight: 500;
            line-height: 1.45;
            text-align: center;
            color: #fef3e2;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            letter-spacing: -0.01em;
            transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.4s ease, filter 0.4s ease;
            word-break: break-word;
            font-family: 'Cormorant Garamond', serif;
            white-space: pre-line;
        }

        /* estilo para versos de anticipación (cursiva elegante) */
        .verse-text.anticipation {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
            letter-spacing: 0.02em;
            font-size: clamp(1.6rem, 5vw, 2.6rem);
        }

        /* estilo para el poema completo */
        .verse-text.full-poem {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.2rem, 4vw, 1.7rem);
            line-height: 1.7;
            text-align: left;
            max-width: 90%;
            margin: 0 auto;
            font-weight: 400;
        }

        /* animación de entrada en cascada para el poema final */
        .verse-text.full-poem.cascade span {
            display: inline-block;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .verse-text.animate-in {
            opacity: 1;
            transform: translateY(0);
        }

        .verse-text.animate-out {
            opacity: 0;
            transform: translateY(12px);
            filter: blur(4px);
        }

        /* === BARRA DE PROGRESO CON GRADIENTE DINÁMICO === */
        .progress-area {
            margin: 1rem 0 2rem 0;
        }

        .progress-track {
            background: rgba(220, 190, 150, 0.2);
            border-radius: 40px;
            height: 4px;
            width: 100%;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #e7c8a0, #f3dbb5, #e6b8a0);
            background-size: 200% auto;
            border-radius: 40px;
            transition: width 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 0 8px #ffdfb0;
            animation: shimmer 2s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .verse-counter {
            text-align: center;
            margin-top: 0.6rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 300;
            color: #cfc6b0;
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* === BOTONES CON EFECTO RIPPLE === */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.8rem;
        }

        .ctrl-btn {
            background: rgba(20, 18, 40, 0.7);
            border: 1px solid rgba(235, 205, 160, 0.4);
            backdrop-filter: blur(4px);
            padding: 0.7rem 1.4rem;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            color: #f7e9d7;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        /* efecto ripple */
        .ctrl-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 220, 180, 0.4);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .ctrl-btn:active::after {
            width: 120px;
            height: 120px;
        }

        .ctrl-btn:hover:not(:disabled) {
            background: rgba(110, 80, 130, 0.7);
            border-color: #eacd92;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
        }

        .ctrl-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .auto-active {
            background: #c7a56e40;
            border-color: #fad896;
            box-shadow: 0 0 12px rgba(250, 200, 120, 0.5);
        }

        /* === FLOR QUE CRECE === */
        .growing-flower {
            text-align: center;
            margin-bottom: 1rem;
            font-size: 1.4rem;
            transition: all 0.3s ease;
        }

        .growing-flower i {
            transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            display: inline-block;
        }

        /* === FOOTER === */
        .signature {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            font-family: 'Inter', sans-serif;
            color: #a7987c;
            letter-spacing: 1px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .signature:hover {
            opacity: 0.8;
        }

        @media (max-width: 560px) {
            .poem-card {
                padding: 1.5rem 1.2rem;
            }
            .verse-stage {
                min-height: 360px;
            }
            .ctrl-btn {
                padding: 0.55rem 1rem;
                font-size: 0.85rem;
            }
        }

        /* animación de carga inicial */
        @keyframes bloom {
            0% {
                transform: scale(0) rotate(-30deg);
                opacity: 0;
            }
            60% {
                transform: scale(1.2) rotate(5deg);
            }
            100% {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        .flower-bloom {
            animation: bloom 0.8s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }
    </style>
</head>
<body>

<div id="particlesContainer"></div>

<main class="poem-card">
    <div class="growing-flower" id="flowerIcon">
        <i class="fas fa-seedling" style="color: #eacd92;"></i>
    </div>

    <div class="verse-stage">
        <div id="verseDisplay" class="verse-text animate-in"></div>
    </div>

    <div class="progress-area">
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="verse-counter" id="verseCounter">1 / 6</div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="prevBtn"><i class="fas fa-chevron-left"></i> <span>Anterior</span></button>
        <button class="ctrl-btn" id="resetBtn"><i class="fas fa-leaf"></i> <span>Renacer</span></button>
        <button class="ctrl-btn" id="nextBtn"><span>Siguiente</span> <i class="fas fa-chevron-right"></i></button>
        <button class="ctrl-btn" id="autoBtn"><i class="fas fa-play"></i> <span>Auto</span></button>
    </div>
    <div class="signature">
        ✦ un viaje hacia la flor eterna ✦
    </div>
</main>

<script>
    // ==================== POEMA SECUENCIAL ====================
    const verses = [
        "Una flor está por nacer...",
        "En el silencio, un pétalo se abre.",
        "Su aroma empieza a tejer memorias.",
        "La esperanza florece en lo profundo.",
        "Pronto, el poema se revelará...",
        `Flor indispensable… Flor única e imprescindible,
en una vida ajena y gastada,
consumida por relatos sin fin,
ocurrencias incalculables, callada.

Tanto así que la vida calmó,
aguas opacas y llenas de pena,
por consecuencia de ti, que llegó,
flor transparente, manantial serena.

Eres paz en mi caos profundo,
luz que aclara lo oscuro y confuso,
indispensable en este mundo,
mi flor eterna, mi todo puro.`
    ];

    const TOTAL_VERSES = verses.length;
    let currentIndex = 0;
    let isAnimating = false;
    let autoInterval = null;
    let isAutoActive = false;

    // Elementos DOM
    const verseDisplay = document.getElementById('verseDisplay');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const autoBtn = document.getElementById('autoBtn');
    const progressFill = document.getElementById('progressFill');
    const verseCounterSpan = document.getElementById('verseCounter');
    const flowerIcon = document.getElementById('flowerIcon');

    // ==================== PARTÍCULAS FLOTANTES ====================
    function createParticles() {
        const container = document.getElementById('particlesContainer');
        const particleCount = 35;
        
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 8 + 3;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.animationDelay = `${Math.random() * 20}s`;
            particle.style.animationDuration = `${Math.random() * 20 + 12}s`;
            particle.style.opacity = Math.random() * 0.4 + 0.1;
            container.appendChild(particle);
        }
    }

    // ==================== FLOR QUE CRECE CON CADA PASO ====================
    function updateFlower() {
        const progress = (currentIndex + 1) / TOTAL_VERSES;
        const icon = flowerIcon.querySelector('i');
        const scale = 0.8 + (progress * 0.8);
        const rotation = progress * 180;
        
        if (currentIndex === TOTAL_VERSES - 1) {
            icon.className = 'fas fa-rose';
            icon.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
            icon.style.color = '#f3b3a0';
            icon.style.filter = 'drop-shadow(0 0 8px #ffb88c)';
        } else if (currentIndex >= 3) {
            icon.className = 'fas fa-fan';
            icon.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
            icon.style.color = '#eacd92';
        } else if (currentIndex >= 1) {
            icon.className = 'fas fa-leaf';
            icon.style.transform = `scale(${scale}) rotate(${rotation / 2}deg)`;
        } else {
            icon.className = 'fas fa-seedling';
            icon.style.transform = `scale(${scale})`;
        }
    }

    // ==================== ACTUALIZAR PROGRESO ====================
    function updateProgressAndCounter() {
        const percent = ((currentIndex + 1) / TOTAL_VERSES) * 100;
        progressFill.style.width = `${percent}%`;
        verseCounterSpan.innerText = `${currentIndex + 1} / ${TOTAL_VERSES}`;
        updateFlower();
    }

    // ==================== APLICAR ESTILO SEGÚN EL TIPO DE VERSO ====================
    function applyVerseStyle() {
        verseDisplay.classList.remove('anticipation', 'full-poem');
        
        if (currentIndex === TOTAL_VERSES - 1) {
            verseDisplay.classList.add('full-poem');
            // efecto cascada para el poema completo
            applyCascadeEffect();
        } else if (currentIndex >= 0 && currentIndex <= 4) {
            verseDisplay.classList.add('anticipation');
        }
    }

    // ==================== EFECTO CASCADA PARA EL POEMA FINAL ====================
    function applyCascadeEffect() {
        const text = verseDisplay.innerText;
        if (currentIndex === TOTAL_VERSES - 1 && text.includes('\n')) {
            // Dividir el texto en versos y envolver cada línea en un span
            const lines = text.split('\n');
            const wrappedLines = lines.map((line, idx) => 
                `<span style="display: block; animation-delay: ${idx * 0.05}s;">${line || '&nbsp;'}</span>`
            ).join('');
            verseDisplay.innerHTML = wrappedLines;
            verseDisplay.classList.add('cascade');
        }
    }

    // ==================== BOTONES ====================
    function updateButtonsState() {
        prevBtn.disabled = (currentIndex === 0);
        
        if (currentIndex === TOTAL_VERSES - 1) {
            nextBtn.disabled = true;
            if (isAutoActive) stopAutoPlay();
        } else {
            nextBtn.disabled = false;
        }
    }

    function stopAutoPlay() {
        if (autoInterval) {
            clearInterval(autoInterval);
            autoInterval = null;
        }
        isAutoActive = false;
        autoBtn.classList.remove('auto-active');
        autoBtn.innerHTML = '<i class="fas fa-play"></i> <span>Auto</span>';
    }

    function startAutoPlay() {
        if (autoInterval) stopAutoPlay();
        if (currentIndex === TOTAL_VERSES - 1) return;
        isAutoActive = true;
        autoBtn.classList.add('auto-active');
        autoBtn.innerHTML = '<i class="fas fa-pause"></i> <span>Auto</span>';
        autoInterval = setInterval(() => {
            if (isAnimating) return;
            if (currentIndex < TOTAL_VERSES - 1) {
                goToNextVerse();
            } else {
                stopAutoPlay();
            }
        }, 5000);
    }

    function toggleAutoPlay() {
        if (isAutoActive) {
            stopAutoPlay();
        } else {
            if (currentIndex !== TOTAL_VERSES - 1) startAutoPlay();
        }
    }

    // ==================== ANIMACIÓN PRINCIPAL ====================
    function changeVerseWithAnimation(newIndex) {
        if (isAnimating) return;
        if (newIndex === currentIndex) return;
        if (newIndex < 0 || newIndex >= TOTAL_VERSES) return;

        isAnimating = true;
        
        verseDisplay.classList.remove('animate-in');
        verseDisplay.classList.add('animate-out');
        
        setTimeout(() => {
            currentIndex = newIndex;
            verseDisplay.innerText = verses[currentIndex];
            
            updateProgressAndCounter();
            updateButtonsState();
            applyVerseStyle();
            
            verseDisplay.classList.remove('animate-out');
            verseDisplay.classList.add('animate-in');
            
            setTimeout(() => {
                isAnimating = false;
                if (isAutoActive && currentIndex === TOTAL_VERSES - 1) {
                    stopAutoPlay();
                }
            }, 120);
        }, 250);
    }

    function goToNextVerse() {
        if (isAnimating) return;
        if (currentIndex + 1 < TOTAL_VERSES) {
            changeVerseWithAnimation(currentIndex + 1);
        }
    }

    function goToPrevVerse() {
        if (isAnimating) return;
        if (currentIndex - 1 >= 0) {
            changeVerseWithAnimation(currentIndex - 1);
        }
    }

    function resetPoem() {
        if (isAnimating) return;
        if (currentIndex === 0) return;
        if (isAutoActive) stopAutoPlay();
        changeVerseWithAnimation(0);
    }

    // ==================== TECLADO ====================
    function handleKeydown(e) {
        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            if (!isAnimating && currentIndex > 0) goToPrevVerse();
            if (isAutoActive) stopAutoPlay();
        } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            if (!isAnimating && currentIndex < TOTAL_VERSES - 1) goToNextVerse();
            if (isAutoActive) stopAutoPlay();
        } else if (e.key === 'Home') {
            e.preventDefault();
            resetPoem();
            if (isAutoActive) stopAutoPlay();
        }
    }

    // ==================== ANIMACIÓN DE CARGA (FLOR QUE FLORECE) ====================
    function initialBloom() {
        const flower = flowerIcon.querySelector('i');
        flower.classList.add('flower-bloom');
        setTimeout(() => {
            flower.classList.remove('flower-bloom');
        }, 800);
    }

    // ==================== INICIALIZAR ====================
    function init() {
        createParticles();
        
        verseDisplay.innerText = verses[0];
        currentIndex = 0;
        updateProgressAndCounter();
        updateButtonsState();
        applyVerseStyle();
        verseDisplay.classList.add('animate-in');
        
        initialBloom();
        
        prevBtn.addEventListener('click', () => {
            if (isAutoActive) stopAutoPlay();
            goToPrevVerse();
        });
        nextBtn.addEventListener('click', () => {
            if (isAutoActive) stopAutoPlay();
            goToNextVerse();
        });
        resetBtn.addEventListener('click', () => {
            if (isAutoActive) stopAutoPlay();
            resetPoem();
        });
        autoBtn.addEventListener('click', toggleAutoPlay);
        window.addEventListener('keydown', handleKeydown);
    }
    
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
